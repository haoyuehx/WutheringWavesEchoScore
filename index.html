<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="鸣潮声骸评分工具：登录库街区，在浏览器本地计算角色声骸评分。">
  <meta name="theme-color" content="#0c1113">
  <title>鸣潮声骸评分</title>
  <link rel="icon" href="./favicon.png">
  <link rel="preconnect" href="https://api.kurobbs.com">
  <link rel="stylesheet" href="./styles.css?v=3">
  <link rel="stylesheet" href="./empty-state.css?v=5">
  <script src="https://static.geetest.com/v4/gt4.js" defer></script>
  <script src="./config.js"></script>
  <script src="./app.js?v=5" type="module"></script>
</head>
<body>
  <div class="orb orb-a"></div><div class="orb orb-b"></div>
  <header class="header">
    <a class="brand" href="./"><i>W</i><span><b>声骸评分</b><small>WUTHERING WAVES</small></span></a>
    <nav>
      <span class="privacy"><i></i> 凭据仅停留在当前页面</span>
      <a class="github-link" href="https://github.com/haoyuehx/WutheringWavesEchoScore" target="_blank" rel="noopener noreferrer" aria-label="在 GitHub 上为项目点 Star">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .7a11.5 11.5 0 0 0-3.64 22.4c.58.1.79-.25.79-.56v-2.23c-3.22.7-3.9-1.37-3.9-1.37-.53-1.34-1.29-1.7-1.29-1.7-1.05-.72.08-.71.08-.71 1.16.08 1.78 1.2 1.78 1.2 1.03 1.77 2.71 1.26 3.37.96.1-.75.4-1.26.73-1.55-2.57-.29-5.27-1.28-5.27-5.69 0-1.26.45-2.28 1.19-3.09-.12-.29-.52-1.46.11-3.05 0 0 .97-.31 3.16 1.18a10.95 10.95 0 0 1 5.76 0c2.2-1.49 3.16-1.18 3.16-1.18.63 1.59.23 2.76.11 3.05.74.81 1.19 1.83 1.19 3.09 0 4.42-2.71 5.39-5.29 5.68.42.36.79 1.06.79 2.14v3.18c0 .31.21.67.8.56A11.5 11.5 0 0 0 12 .7Z"/></svg>
        <span>Star on GitHub</span><b>☆</b>
      </a>
      <button id="logout" class="logout" type="button" hidden>退出</button>
    </nav>
  </header>

  <main>
    <section id="loginView" class="login-layout">
      <div class="hero">
        <p class="eyebrow">WUTHERING WAVES</p>
        <h1>鸣潮<br><em>声骸评分</em></h1>
        <p class="lead">登录库街区，选择共鸣者，查看每枚声骸的词条评分和角色总评分。</p>
        <div class="features"><span><b>01</b> 官方数据</span><span><b>02</b> 本地计算</span><span><b>03</b> 不留凭据</span></div>
      </div>
      <div class="login-card panel">
        <div class="panel-title"><i>01</i><span><h2>登录库街区</h2><p>使用手机号验证码登录</p></span></div>
        <form id="loginForm" novalidate>
          <label><span>手机号</span><input id="phone" type="tel" inputmode="numeric" autocomplete="tel" maxlength="11" placeholder="请输入 11 位手机号"></label>
          <label><span>验证码</span><span class="code-row"><input id="code" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="6 位验证码"><button id="sendCode" type="button" disabled>获取验证码</button></span></label>
          <label class="remember"><input id="remember" type="checkbox" checked><span>在此设备保存登录状态 7 天</span></label>
          <button id="login" class="primary" type="submit"><span>登录并读取角色</span><b>→</b></button>
        </form>
        <p class="secure">◈ 手机号和验证码直接发送至 api.kurobbs.com；勾选保存时，token 仅存于此浏览器，退出登录会立即清除。</p>
      </div>
    </section>

    <section id="dashboard" class="dashboard" hidden>
      <div class="dash-title"><div><p class="eyebrow">YOUR RESONATORS</p><h1>选择共鸣者</h1></div><label><span>游戏账号</span><select id="account"></select></label></div>
      <div id="characters" class="characters"></div>
      <section id="scores" class="scores" hidden><div id="summary" class="summary"></div><div id="echoes" class="echoes"></div><p class="disclaimer">评分沿用开源项目模板，仅供配装参考与娱乐，不代表官方评价或实际伤害。</p></section>
    </section>
  </main>

  <div id="toast" class="toast" role="status" hidden></div>
  <div id="loading" class="loading" hidden><i></i><p id="loadingText">正在连接库街区…</p></div>
  <noscript>此页面需要启用 JavaScript。</noscript>
</body>
</html>
